apiVersion: operators.coreos.com/v1alpha1
kind: ClusterServiceVersion
metadata:
  annotations:
    alm-examples: |-
      [
        {
          "apiVersion": "database.mongodb.example.com/v1beta1",
          "kind": "MongoCluster",
          "metadata": {
            "labels": {
              "app.kubernetes.io/managed-by": "kustomize",
              "app.kubernetes.io/name": "mongodb-operator"
            },
            "name": "mongocluster-sample"
          },
          "spec": {
            "replicas": 3,
            "version": "7.0",
            "storage": {
              "size": "10Gi"
            },
            "backup": {
              "enabled": true,
              "retentionDays": 7
            }
          }
        },
        {
          "apiVersion": "backup.mongodb.example.com/v1beta1",
          "kind": "MongoBackupPolicy",
          "metadata": {
            "labels": {
              "app.kubernetes.io/managed-by": "kustomize",
              "app.kubernetes.io/name": "mongodb-operator"
            },
            "name": "mongobackuppolicy-sample"
          },
          "spec": {
            "clusterRef": "mongocluster-sample",
            "schedule": "0 2 * * *",
            "retentionDays": 30,
            "storageSize": "10Gi"
          }
        }
      ]
    capabilities: Basic Install
    categories: Database
    certified: "false"
    createdAt: "2026-05-13T00:00:00Z"
    operators.operatorframework.io/builder: operator-sdk-v1.37.0
    operators.operatorframework.io/project_layout: go.kubebuilder.io/v4
    repository: https://github.com/example/mongodb-operator
  name: mongodb-operator.v0.5.0
  namespace: placeholder
spec:
  apiservicedefinitions: {}
  customresourcedefinitions:
    owned:
    - description: MongoCluster is the Schema for the mongoclusters API
      displayName: Mongo Cluster
      kind: MongoCluster
      name: mongoclusters.database.mongodb.example.com
      version: v1beta1
      resources:
      - kind: StatefulSet
        version: v1
      - kind: Service
        version: v1
      - kind: Secret
        version: v1
      - kind: ConfigMap
        version: v1
      - kind: Job
        version: v1
      - kind: Deployment
        version: v1
      - kind: NetworkPolicy
        version: v1
      specDescriptors:
      - path: replicas
        displayName: Replicas
        description: Number of MongoDB replica set members
      - path: version
        displayName: Version
        description: MongoDB major version to deploy
      - path: storage
        displayName: Storage
        description: Persistent storage configuration
      - path: resources
        displayName: Resources
        description: CPU and memory resource requirements
      - path: auth
        displayName: Auth
        description: Optional authentication configuration
      - path: backup
        displayName: Backup
        description: Optional backup configuration
      - path: backup.enabled
        displayName: Backup Enabled
        description: Whether backup is active
      - path: backup.retentionDays
        displayName: Retention Days
        description: Number of days to retain backups
      - path: arbiter
        displayName: Arbiter
        description: Optional arbiter node configuration
      - path: arbiter.enabled
        displayName: Arbiter Enabled
        description: Whether the arbiter node is active
      - path: sharding
        displayName: Sharding
        description: Optional sharding configuration
      - path: sharding.enabled
        displayName: Sharding Enabled
        description: Whether sharding is active
      - path: sharding.shards
        displayName: Shards
        description: Number of shards
      - path: sharding.configServerReplicas
        displayName: Config Server Replicas
        description: Number of config server replicas
      - path: maxConnections
        displayName: Max Connections
        description: Maximum number of incoming connections
      statusDescriptors:
      - path: phase
        displayName: Phase
        description: Current lifecycle phase of the MongoCluster
      - path: readyReplicas
        displayName: Ready Replicas
        description: Number of MongoDB instances that are ready
      - path: currentVersion
        displayName: Current Version
        description: Currently running MongoDB version
      - path: primaryEndpoint
        displayName: Primary Endpoint
        description: Client service connection endpoint for the MongoDB cluster
      - path: conditions
        displayName: Conditions
        description: Latest available observations of the resource state
      - path: lastBackupTime
        displayName: Last Backup Time
        description: When the last backup Job completed successfully
      - path: shardingEnabled
        displayName: Sharding Enabled
        description: Whether sharding is currently active
    - description: MongoBackupPolicy is the Schema for the mongobackuppolicies API
      displayName: Mongo Backup Policy
      kind: MongoBackupPolicy
      name: mongobackuppolicies.backup.mongodb.example.com
      version: v1beta1
      resources:
      - kind: CronJob
        version: v1
      - kind: PersistentVolumeClaim
        version: v1
      specDescriptors:
      - path: clusterRef
        displayName: Cluster Reference
        description: Name of the MongoCluster to back up
      - path: schedule
        displayName: Schedule
        description: Cron expression for backup frequency
      - path: retentionDays
        displayName: Retention Days
        description: Number of days to retain backups
      - path: storageSize
        displayName: Storage Size
        description: PVC size for storing backups
      statusDescriptors:
      - path: phase
        displayName: Phase
        description: Current lifecycle phase
      - path: conditions
        displayName: Conditions
        description: Latest available observations
      - path: lastBackupTime
        displayName: Last Backup Time
        description: When the last backup completed
      - path: nextBackupTime
        displayName: Next Backup Time
        description: Next scheduled backup time
      - path: backupCount
        displayName: Backup Count
        description: Total number of completed backups
  description: |
    ## Overview
    The MongoDB Operator manages MongoCluster resources on OpenShift.
    It automates deployment, scaling, and lifecycle management of
    MongoDB replica sets using StatefulSets, Services, Secrets,
    ConfigMaps, backup Jobs, and Arbiter Deployments.

    ## v0.5.0 — Multi-CRD: MongoBackupPolicy
    - Added MongoBackupPolicy CRD in backup.mongodb.example.com group
    - Scheduled backups via CronJob with PVC storage
    - Cross-group reference to MongoCluster via clusterRef
    - Different API group layout (scaffolding Workflow C)
  displayName: MongoDB Operator
  icon:
  - base64data: ""
    mediatype: "image/svg+xml"
