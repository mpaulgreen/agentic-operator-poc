apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: mongodb-operator
    app.kubernetes.io/managed-by: kustomize
  name: mongocluster-editor-role
rules:
- apiGroups:
  - database.mongodb.example.com
  resources:
  - mongoclusters
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - database.mongodb.example.com
  resources:
  - mongoclusters/status
  verbs:
  - get
