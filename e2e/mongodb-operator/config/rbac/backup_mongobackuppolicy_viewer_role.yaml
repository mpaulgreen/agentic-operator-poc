apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: mongodb-operator
    app.kubernetes.io/managed-by: kustomize
  name: mongobackuppolicy-viewer-role
rules:
- apiGroups:
  - backup.mongodb.example.com
  resources:
  - mongobackuppolicies
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - backup.mongodb.example.com
  resources:
  - mongobackuppolicies/status
  verbs:
  - get
