---
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: mutating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /mutate-database-mongodb-example-com-v1alpha1-mongocluster
  failurePolicy: Fail
  name: mmongoclusterv1alpha1.kb.io
  rules:
  - apiGroups:
    - database.mongodb.example.com
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - mongoclusters
  sideEffects: None
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: validating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /validate-database-mongodb-example-com-v1alpha1-mongocluster
  failurePolicy: Fail
  name: vmongoclusterv1alpha1.kb.io
  rules:
  - apiGroups:
    - database.mongodb.example.com
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - mongoclusters
  sideEffects: None
