apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: elasticsearch-operator
    app.kubernetes.io/managed-by: kustomize
  name: elasticsearchindex-viewer-role
rules:
- apiGroups:
  - search.elasticsearch.example.com
  resources:
  - elasticsearchindices
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - search.elasticsearch.example.com
  resources:
  - elasticsearchindices/status
  verbs:
  - get
