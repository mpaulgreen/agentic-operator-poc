apiVersion: operators.coreos.com/v1alpha1
kind: ClusterServiceVersion
metadata:
  annotations:
    alm-examples: |-
      [
        {
          "apiVersion": "cache.redis.example.com/v1beta1",
          "kind": "RedisCluster",
          "metadata": {
            "labels": {
              "app.kubernetes.io/managed-by": "kustomize",
              "app.kubernetes.io/name": "redis-operator"
            },
            "name": "rediscluster-sample"
          },
          "spec": {
            "replicas": 3,
            "version": "7.4",
            "storage": {
              "size": "10Gi"
            },
            "resources": {
              "requests": {
                "cpu": "250m",
                "memory": "256Mi"
              },
              "limits": {
                "cpu": "500m",
                "memory": "512Mi"
              }
            },
            "auth": {
              "existingSecret": "redis-auth"
            },
            "tls": {
              "enabled": true,
              "secretName": "redis-tls"
            },
            "maxMemory": "512Mi"
          }
        }
      ]
    capabilities: Basic Install
    categories: Database
    certified: "false"
    createdAt: "2026-05-11T00:00:00Z"
    operators.operatorframework.io/builder: operator-sdk-v1.37.0
    operators.operatorframework.io/project_layout: go.kubebuilder.io/v4
    repository: https://github.com/example/redis-operator
  name: redis-operator.v0.4.0
  namespace: placeholder
spec:
  apiservicedefinitions: {}
  customresourcedefinitions:
    owned:
    - description: RedisCluster is the Schema for the redisclusters API
      displayName: Redis Cluster
      kind: RedisCluster
      name: redisclusters.cache.redis.example.com
      version: v1beta1
      resources:
      - kind: StatefulSet
        version: v1
      - kind: Service
        version: v1
      - kind: Secret
        version: v1
      - kind: ConfigMap
        version: v1
      - kind: PodDisruptionBudget
        version: v1
      - kind: Deployment
        version: v1
      - kind: NetworkPolicy
        version: v1
      specDescriptors:
      - path: replicas
        displayName: Replicas
        description: Number of Redis instances to run
      - path: version
        displayName: Version
        description: Redis major version to deploy
      - path: storage
        displayName: Storage
        description: Persistent storage configuration
      - path: resources
        displayName: Resources
        description: CPU and memory resource requirements
      - path: auth
        displayName: Auth
        description: Optional authentication configuration
      - path: sentinel
        displayName: Sentinel
        description: Redis Sentinel HA configuration
      - path: sentinel.enabled
        displayName: Enabled
        description: Whether Sentinel HA is active
      - path: sentinel.replicas
        displayName: Replicas
        description: Number of Sentinel instances
      - path: tls
        displayName: TLS
        description: TLS/SSL configuration for Redis connections
      - path: tls.enabled
        displayName: TLS Enabled
        description: Whether TLS is active for Redis connections
      - path: tls.secretName
        displayName: TLS Secret Name
        description: Name of Secret containing tls.crt and tls.key
      - path: tls.certManager
        displayName: Cert Manager
        description: Whether cert-manager should provision certificates
      - path: maxMemory
        displayName: Max Memory
        description: Maximum memory Redis can use
      statusDescriptors:
      - path: phase
        displayName: Phase
        description: Current lifecycle phase of the RedisCluster
      - path: readyReplicas
        displayName: Ready Replicas
        description: Number of Redis instances that are ready
      - path: currentVersion
        displayName: Current Version
        description: Currently running Redis version
      - path: masterEndpoint
        displayName: Master Endpoint
        description: Client service connection endpoint for the Redis cluster
      - path: conditions
        displayName: Conditions
        description: Latest available observations of the resource state
      - path: sentinelEndpoint
        displayName: Sentinel Endpoint
        description: Sentinel service connection endpoint
      - path: tlsEnabled
        displayName: TLS Enabled
        description: Whether TLS is currently active on the Redis cluster
  description: |
    ## Overview
    The Redis Operator manages Redis clusters on Kubernetes.
    It automates deployment, scaling, and lifecycle management of
    Redis instances using StatefulSets, Services, Secrets, ConfigMaps,
    PodDisruptionBudgets for high availability, NetworkPolicies for
    cluster isolation, and webhooks for admission control.

    ## v0.4.0 — API Versioning + TLS Support
    - Added v1beta1 API version (storage version) with TLS and MaxMemory fields
    - v1alpha1 API remains available for backward compatibility
    - TLS support: enable encrypted connections with manual secrets or cert-manager
    - MaxMemory: configure Redis memory limits via the CRD
  displayName: Redis Operator
  icon:
  - base64data: ""
    mediatype: "image/svg+xml"
  install:
    spec:
      clusterPermissions:
      - rules:
        - apiGroups:
          - cache.redis.example.com
          resources:
          - redisclusters
          verbs:
          - create
          - delete
          - get
          - list
          - patch
          - update
          - watch
        - apiGroups:
          - cache.redis.example.com
          resources:
          - redisclusters/status
          verbs:
          - get
          - patch
          - update
        - apiGroups:
          - cache.redis.example.com
          resources:
          - redisclusters/finalizers
          verbs:
          - update
        - apiGroups:
          - ""
          resources:
          - events
          verbs:
          - create
          - patch
        - apiGroups:
          - ""
          resources:
          - secrets
          verbs:
          - create
          - delete
          - get
          - list
          - patch
          - update
          - watch
        - apiGroups:
          - ""
          resources:
          - configmaps
          verbs:
          - create
          - delete
          - get
          - list
          - patch
          - update
          - watch
        - apiGroups:
          - ""
          resources:
          - services
          verbs:
          - create
          - delete
          - get
          - list
          - patch
          - update
          - watch
        - apiGroups:
          - apps
          resources:
          - statefulsets
          verbs:
          - create
          - delete
          - get
          - list
          - patch
          - update
          - watch
        - apiGroups:
          - policy
          resources:
          - poddisruptionbudgets
          verbs:
          - create
          - delete
          - get
          - list
          - patch
          - update
          - watch
        - apiGroups:
          - apps
          resources:
          - deployments
          verbs:
          - create
          - delete
          - get
          - list
          - patch
          - update
          - watch
        - apiGroups:
          - networking.k8s.io
          resources:
          - networkpolicies
          verbs:
          - create
          - delete
          - get
          - list
          - patch
          - update
          - watch
        serviceAccountName: redis-operator-controller-manager
      deployments:
      - label:
          app.kubernetes.io/managed-by: kustomize
          app.kubernetes.io/name: redis-operator
          control-plane: controller-manager
        name: redis-operator-controller-manager
        spec:
          replicas: 1
          selector:
            matchLabels:
              control-plane: controller-manager
          strategy: {}
          template:
            metadata:
              annotations:
                kubectl.kubernetes.io/default-container: manager
              labels:
                control-plane: controller-manager
            spec:
              containers:
              - args:
                - --health-probe-bind-address=:8081
                - --metrics-bind-address=:8443
                - --metrics-secure=true
                - --leader-elect
                command:
                - /manager
                image: quay.io/mpaulgreen/redis-operator:v0.4.0
                livenessProbe:
                  httpGet:
                    path: /healthz
                    port: 8081
                  initialDelaySeconds: 15
                  periodSeconds: 20
                name: manager
                readinessProbe:
                  httpGet:
                    path: /readyz
                    port: 8081
                  initialDelaySeconds: 5
                  periodSeconds: 10
                resources:
                  limits:
                    cpu: 500m
                    memory: 128Mi
                  requests:
                    cpu: 10m
                    memory: 64Mi
                securityContext:
                  allowPrivilegeEscalation: false
                  capabilities:
                    drop:
                    - ALL
              securityContext:
                runAsNonRoot: true
              serviceAccountName: redis-operator-controller-manager
              terminationGracePeriodSeconds: 10
      permissions:
      - rules:
        - apiGroups:
          - ""
          resources:
          - configmaps
          verbs:
          - get
          - list
          - watch
          - create
          - update
          - patch
          - delete
        - apiGroups:
          - coordination.k8s.io
          resources:
          - leases
          verbs:
          - get
          - list
          - watch
          - create
          - update
          - patch
          - delete
        - apiGroups:
          - ""
          resources:
          - events
          verbs:
          - create
          - patch
        serviceAccountName: redis-operator-controller-manager
    strategy: deployment
  installModes:
  - supported: true
    type: OwnNamespace
  - supported: true
    type: SingleNamespace
  - supported: false
    type: MultiNamespace
  - supported: true
    type: AllNamespaces
  keywords:
  - redis
  - cache
  - database
  - nosql
  links:
  - name: Documentation
    url: https://github.com/example/redis-operator
  - name: Source Code
    url: https://github.com/example/redis-operator
  maintainers:
  - email: maintainer@example.com
    name: Maintainer
  maturity: beta
  minKubeVersion: "1.25.0"
  provider:
    name: Example
    url: https://example.com
  replaces: redis-operator.v0.3.0
  version: 0.4.0
  webhookdefinitions:
  - admissionReviewVersions:
    - v1
    containerPort: 9443
    deploymentName: redis-operator-controller-manager
    failurePolicy: Fail
    generateName: mredisclusterv1beta1.kb.io
    rules:
    - apiGroups:
      - cache.redis.example.com
      apiVersions:
      - v1beta1
      operations:
      - CREATE
      - UPDATE
      resources:
      - redisclusters
    sideEffects: None
    targetPort: 9443
    type: MutatingAdmissionWebhook
    webhookPath: /mutate-cache-redis-example-com-v1beta1-rediscluster
  - admissionReviewVersions:
    - v1
    containerPort: 9443
    deploymentName: redis-operator-controller-manager
    failurePolicy: Fail
    generateName: vredisclusterv1beta1.kb.io
    rules:
    - apiGroups:
      - cache.redis.example.com
      apiVersions:
      - v1beta1
      operations:
      - CREATE
      - UPDATE
      resources:
      - redisclusters
    sideEffects: None
    targetPort: 9443
    type: ValidatingAdmissionWebhook
    webhookPath: /validate-cache-redis-example-com-v1beta1-rediscluster
