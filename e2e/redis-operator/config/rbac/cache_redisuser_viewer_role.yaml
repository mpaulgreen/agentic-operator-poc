apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: redis-operator
    app.kubernetes.io/managed-by: kustomize
  name: redisuser-viewer-role
rules:
- apiGroups:
  - cache.redis.example.com
  resources:
  - redisusers
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - cache.redis.example.com
  resources:
  - redisusers/status
  verbs:
  - get
