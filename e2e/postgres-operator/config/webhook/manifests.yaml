---
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: mutating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /mutate-database-postgres-example-com-v1beta1-postgrescluster
  failurePolicy: Fail
  name: mpostgresclusterv1beta1.kb.io
  rules:
  - apiGroups:
    - database.postgres.example.com
    apiVersions:
    - v1beta1
    operations:
    - CREATE
    - UPDATE
    resources:
    - postgresclusters
  sideEffects: None
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: validating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /validate-database-postgres-example-com-v1beta1-postgrescluster
  failurePolicy: Fail
  name: vpostgresclusterv1beta1.kb.io
  rules:
  - apiGroups:
    - database.postgres.example.com
    apiVersions:
    - v1beta1
    operations:
    - CREATE
    - UPDATE
    resources:
    - postgresclusters
  sideEffects: None
