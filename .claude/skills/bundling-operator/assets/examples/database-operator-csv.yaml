    createdAt: "2026-01-21T23:40:40Z"
    operators.operatorframework.io/builder: operator-sdk-v1.37.0
    operators.operatorframework.io/project_layout: go.kubebuilder.io/v4
    repository: https://github.com/mpaulgreen/go-operator
  name: database-operator.v0.0.1
  namespace: placeholder
spec:
  apiservicedefinitions: {}
  customresourcedefinitions:
    owned:
    - description: DatabaseCluster is the Schema for the databaseclusters API
      displayName: Database Cluster
      kind: DatabaseCluster
      name: databaseclusters.database.redhat.com
      version: v1alpha1
  description: |
    ## Overview
    The Database Operator manages PostgreSQL clusters with:
    - Automated deployment and scaling
    - Persistent storage management
    - Automated credential management
    - Metrics and monitoring integration

    ## Features
    - Deploy PostgreSQL clusters with customizable replica counts
    - Automatic StatefulSet and Service management
    - Secure credential storage in Kubernetes Secrets
    - Support for custom storage configurations
    - Event recording for operational visibility
  displayName: Database Operator
